name: rake

on:
  push:
    branches: [ master, main ]
  pull_request:

permissions:
  contents: write

jobs:
  rake:
    uses: metanorma/ci/.github/workflows/generic-rake.yml@main
    with:
      setup-tools: inkscape,ghostscript
      submodules: true
      choco-cache: true
    secrets:
      pat_token: ${{ secrets.METANORMA_CI_PAT_TOKEN }}
